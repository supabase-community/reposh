name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_publish:
        description: 'Skip release-please and publish current package.json version'
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - id: release
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # Everything below only runs when a release PR is merged.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        if: ${{ steps.release.outputs.release_created == 'true' || inputs.force_publish == true }}

      - uses: pnpm/action-setup@9fd676a19091d4595eefd76e4bd31c97133911f1 # v4.2.0
        if: ${{ steps.release.outputs.release_created == 'true' || inputs.force_publish == true }}

      - uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
        if: ${{ steps.release.outputs.release_created == 'true' || inputs.force_publish == true }}
        with:
          node-version: 24
          cache: 'pnpm'
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        if: ${{ steps.release.outputs.release_created == 'true' || inputs.force_publish == true }}
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build
        if: ${{ steps.release.outputs.release_created == 'true' || inputs.force_publish == true }}
        run: pnpm build

      - name: Publish to npm
        if: ${{ steps.release.outputs.release_created == 'true' || inputs.force_publish == true }}
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./package.json').version")
          NPM_VIEW_STDERR=$(mktemp)
          EXISTING=$(npm view "reposh@$VERSION" version 2>"$NPM_VIEW_STDERR") || STATUS=$?
          if [ -n "$EXISTING" ]; then
            echo "reposh@$VERSION is already published, skipping."
            rm -f "$NPM_VIEW_STDERR"
            exit 0
          elif [ "${STATUS:-0}" -ne 0 ] && ! grep -qiE 'E404|not found' "$NPM_VIEW_STDERR"; then
            cat "$NPM_VIEW_STDERR"
            rm -f "$NPM_VIEW_STDERR"
            exit 1
          fi
          rm -f "$NPM_VIEW_STDERR"
          pnpm publish --access public --no-git-checks --ignore-scripts --provenance
